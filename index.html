<style>

  .item-block  { margin-bottom: 4px; }
  .item-title  { font-size: 16px; font-weight: bold; color: #1a6632; margin-bottom: 4px; }
  .item-kw     { color: #666; font-size: 13px; margin-top: 2px; margin-bottom: 6px; line-height: 1.6; }
  .lbl-cat     { display: inline-block; background: #1a6632; color: #fff; font-size: 14px; font-weight: bold; padding: 2px 10px; border-radius: 20px; margin-bottom: 6px; }
  .lbl-cat-sm  { display: inline-block; background: #1a6632; color: #fff; font-size: 12px; font-weight: bold; padding: 1px 8px; border-radius: 20px; vertical-align: middle; margin-left: 4px; }
  .lbl-method  { color: #1a4a25; font-weight: bold; font-size: 12px; margin-top: 8px; margin-bottom: 2px; }
  .lbl-place   { color: #8b4513; font-weight: bold; font-size: 12px; margin-top: 8px; margin-bottom: 2px; }
  .lbl-note    { color: #c0392b; font-weight: bold; font-size: 12px; margin-top: 8px; margin-bottom: 2px; }
  .val-method  { color: #1a1a1a; font-size: 15px; line-height: 2.0; white-space: pre-wrap; }
  .val-place   { color: #6b3010; font-size: 15px; line-height: 2.0; background: #fff8f0; border-radius: 6px; padding: 6px 10px; border-left: 3px solid #e0a040; }
  .val-note    { color: #b33020; font-size: 15px; line-height: 2.0; background: #fff5f5; border-radius: 6px; padding: 6px 10px; border-left: 3px solid #e05040; }
  .divider     { border: none; border-top: 1px solid #d5ead8; margin: 12px 0; }
  .time        { margin-top: 6px; font-size: 11px; color: #aaa; text-align: right; }
  .footer      { text-align: center; font-size: 11px; color: #aaa; padding: 20px 0 32px; }
  .loading-bar { width: 100%; height: 3px; background: #e0e0e0; border-radius: 3px; margin-top: 10px; display: none; overflow: hidden; }
  .loading-bar-inner { height: 100%; width: 30%; background: #1a6632; border-radius: 3px; animation: slide 1.2s ease-in-out infinite; }
  @keyframes slide { 0% { transform: translateX(-100%); } 100% { transform: translateX(400%); } }
</style>

<body>
<div class="header">
  <h1>­ЪЌЉ жЄДУи»тИѓсЂћсЂ┐тѕєтѕЦТцюу┤б</h1>
  <p>тЊЂуЏ«тљЇсѓњтЁЦтіЏсЂЌсЂдТЇесЂдТќ╣сѓњУф┐сЂ╣сѓЅсѓїсЂЙсЂЎ</p>
</div>
<div class="container">
  <div class="search-box">
    <input type="text" id="q"
      placeholder="СЙІ№╝џсЃљсЃЃсЃєсЃфсЃ╝сђЂТХѕуЂФтЎесђЂсЃєсЃгсЃЊ"
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
      onkeydown="if(event.key==='Enter')doSearch()">
    <button id="btn" onclick="doSearch()" disabled>УфГсЂ┐УЙ╝сЂ┐СИГРђд</button>
    <div class="loading-bar" id="bar"><div class="loading-bar-inner"></div></div>
    <div id="dbst" class="db-status">Т║ќтѓЎСИГРђд</div>
    <div class="note">
      УдІсЂцсЂІсѓЅсЂфсЂёта┤тљѕсЂ»сЂіжЏ╗УЕ▒сЂЈсЂасЂЋсЂё<br>
      <a href="tel:0154-24-4146">­ЪЊъ уњ░тбЃС║ІТЦГУф▓ 0154-24-4146</a><br>
      тЈЌС╗ўТЎѓжќЊ№╝џт╣│ТЌЦ 9:00сђю17:00
    </div>
  </div>
  <div class="result-wrap" id="wrap">
    <div class="result-header" id="hdr"></div>
    <div class="result-body"  id="out"></div>
  </div>
  <div class="time" id="tim"></div>
  <div class="footer">жЄДУи»тИѓ тИѓТ░Љуњ░тбЃжЃе уњ░тбЃС║ІТЦГУф▓</div>
</div>
<script>
// ============================================
// DBсЂ»GitHubСИісЂ«JSONсЃЋсѓАсѓцсЃФсЂІсѓЅтЈќтЙЌ
// GASсЂИсЂ«СЙЮтГўсЂфсЂЌ
// ============================================
var DB_URL   = 'https://kakankyoukanri-dot.github.io/kushiro-gomi/gomi_db.json';
var LOG_URL  = 'https://script.google.com/macros/s/AKfycbwdSfB2MNQly7joNssHBJQGEnLUovT3W3zI8Fr9YRRPX2xTV524hxHdzlqAjlveIugSxQ/exec';
var DB       = [];
var ICONS    = {};
var DB_READY = false;

// УхитІЋТЎѓсЂФGitHubсЂІсѓЅDBтЈќтЙЌ
fetch(DB_URL)
  .then(function(r) { return r.json(); })
  .then(function(d) {
    DB       = d.db    || [];
    ICONS    = d.icons || {};
    DB_READY = true;
    // УфГсЂ┐УЙ╝сЂ┐т«їС║єтЙїсЂ»Т║ќтѓЎСИГУАеуц║сѓњТХѕсЂЎ
    document.getElementById('dbst').style.display = 'none';
    document.getElementById('btn').disabled        = false;
    document.getElementById('btn').textContent     = '­ЪћЇ ТЇесЂдТќ╣сѓњУф┐сЂ╣сѓІ';
  })
  .catch(function() {
    var dbst = document.getElementById('dbst');
    dbst.className        = 'db-error';
    dbst.textContent      = 'УфГсЂ┐УЙ╝сЂ┐тц▒ТЋЌсђѓсЃџсЃ╝сѓИсѓњтєЇУфГсЂ┐УЙ╝сЂ┐сЂЌсЂдсЂЈсЂасЂЋсЂёсђѓ';
    dbst.style.display    = 'block';
    document.getElementById('btn').disabled    = false;
    document.getElementById('btn').textContent = '­ЪћЇ ТЇесЂдТќ╣сѓњУф┐сЂ╣сѓІ';
  });

// ТГБУдЈтїќ
function toK(s) { return s.replace(/[\u3041-\u3096]/g, function(c) { return String.fromCharCode(c.charCodeAt(0) + 96); }); }
function toH(s) { return s.replace(/[\u30A1-\u30F6]/g, function(c) { return String.fromCharCode(c.charCodeAt(0) - 96); }); }
function norm(str) {
  var s = str.toLowerCase()
    .replace(/[\uFF21-\uFF3A\uFF41-\uFF5A\uFF10-\uFF19]/g, function(c) { return String.fromCharCode(c.charCodeAt(0) - 65248); })
    .replace(/[\u30FC\u2015\u2212\uFF0D]/g, '\u30FC')
    .replace(/\s/g, '');
  return [s, toK(s), toH(s)];
}

// Тцюу┤б
function searchLocal(query) {
  var res = [], qs = norm(query);
  var len = query.length;
  var useFront   = len >= 3;
  var usePartial = len >= 3;

  for (var i = 0; i < DB.length; i++) {
    var r = DB[i], sc = 0;
    var nv = norm(r.name), done = false;
    for (var qi = 0; qi < qs.length && !done; qi++) {
      for (var ni = 0; ni < nv.length && !done; ni++) {
        if (nv[ni] === qs[qi]) {
          sc = 110; done = true;
        } else if (useFront && nv[ni].indexOf(qs[qi]) === 0) {
          sc = Math.max(sc, 85);
        } else if (usePartial && nv[ni].indexOf(qs[qi]) > -1) {
          sc = Math.max(sc, 65);
        }
      }
    }
    if (sc < 110) {
      var dk = false;
      for (var ki = 0; ki < r.keywords.length && !dk; ki++) {
        if (!r.keywords[ki]) continue;
        var kv = norm(r.keywords[ki]);
        for (var qi2 = 0; qi2 < qs.length && !dk; qi2++) {
          for (var kvi = 0; kvi < kv.length && !dk; kvi++) {
            if (kv[kvi] === qs[qi2]) {
              sc = Math.max(sc, 100); dk = true;
            } else if (useFront && kv[kvi].indexOf(qs[qi2]) === 0) {
              sc = Math.max(sc, 80);
            } else if (usePartial && kv[kvi].indexOf(qs[qi2]) > -1) {
              sc = Math.max(sc, 60);
            }
          }
        }
      }
    }
    if (len <= 2 && sc < 100) continue;
    if (sc > 0) res.push({ item: r, score: sc });
  }
  res.sort(function(a, b) { return b.score - a.score || a.item.name.localeCompare(b.item.name, 'ja'); });
  return res.map(function(r) { return r.item; });
}

// Тцюу┤бт«ЪУАї
function doSearch() {
  var q = document.getElementById('q').value.trim();
  if (!q) return;
  if (!DB_READY) { alert('сЃЄсЃ╝сѓ┐УфГсЂ┐УЙ╝сЂ┐СИГсЂДсЂЎсђѓсЂЌсЂ░сѓЅсЂЈсЂітЙЁсЂАсЂЈсЂасЂЋсЂёсђѓ'); return; }

  var wrap = document.getElementById('wrap');
  var out  = document.getElementById('out');
  var hdr  = document.getElementById('hdr');
  var tim  = document.getElementById('tim');
  var btn  = document.getElementById('btn');
  var bar  = document.getElementById('bar');

  wrap.style.display = 'none';
  tim.textContent    = '';
  btn.disabled       = true;
  bar.style.display  = 'block';

  var t       = Date.now();
  var results = searchLocal(q);
  var ans     = formatResults(q, results);

  hdr.textContent    = ans.header;
  out.className      = ans.notfound ? 'result-body notfound' : 'result-body';
  out.innerHTML      = ans.html;
  wrap.style.display = 'block';
  tim.textContent    = 'Тцюу┤бТЎѓжќЊ№╝џ' + ((Date.now() - t) / 1000).toFixed(3) + 'уДњ';
  btn.disabled       = false;
  bar.style.display  = 'none';
  wrap.scrollIntoView({ behavior: 'smooth', block: 'start' });

  // сЃГсѓ░С┐ЮтГў№╝ѕGASсЂФжђЂС┐АсЃ╗С╗╗ТёЈ№╝Ѕ
  fetch(LOG_URL + '?q=' + encodeURIComponent(q) + '&found=' + (results.length > 0 ? '1' : '0'))
    .catch(function() {});

  // Google AnalyticsсЂФТцюу┤бсѓцсЃЎсЃ│сЃѕсѓњжђЂС┐А
  if (typeof gtag !== 'undefined') {
    gtag('event', 'search', {
      search_term: q,
      found: results.length > 0 ? 'уЎ╗жї▓ТИѕсЂ┐' : 'ТюфуЎ╗жї▓'
    });
  }
}

// ухљТъюсЃЋсѓЕсЃ╝сЃъсЃЃсЃѕ
function formatResults(q, results) {
  if (results.length === 0) {
    return { header: 'Тцюу┤бухљТъю', notfound: true,
      html: esc('сђї' + q + 'сђЇсЂ«ТЇесЂдТќ╣сЂїУдІсЂцсЂІсѓісЂЙсЂЏсѓЊсЂДсЂЌсЂЪсђѓ\nтѕЦсЂ«УеђУЉЅсЂДТцюу┤бсЂЎсѓІсЂІсђЂсЂіжЏ╗УЕ▒сЂДсЂітЋЈсЂётљѕсѓЈсЂЏсЂЈсЂасЂЋсЂёсђѓ\n­ЪЊъ уњ░тбЃС║ІТЦГУф▓сђђ0154-24-4146\nтЈЌС╗ўТЎѓжќЊ№╝џт╣│ТЌЦ 9:00сђю17:00').replace(/\n/g, '<br>') };
  }
  if (results.length === 1) {
    var r    = results[0];
    var icon = ICONS[r.category] || '';
    var lbl  = r.name !== q ? 'сђї' + q + 'сђЇРєњсђї' + r.name + 'сђЇ' : 'сђї' + q + 'сђЇсЂ«ТЇесЂдТќ╣';
    var html = '<div class="item-title">' + esc(r.name) + '&nbsp;<span class="lbl-cat-sm">' + icon + ' ' + esc(r.category) + '</span></div>';
    html += buildHtml(r, false);
    return { header: lbl, notfound: false, html: html };
  }
  var html = '', shown = results.slice(0, 5);
  shown.forEach(function(r, i) {
    var icon = ICONS[r.category] || '';
    if (i > 0) html += '<hr class="divider">';
    html += '<div class="item-block">';
    html += '<div class="item-title">сђљ' + (i + 1) + 'сђЉ' + esc(r.name) + '&nbsp;<span class="lbl-cat-sm">' + icon + ' ' + esc(r.category) + '</span></div>';
    var dk = r.keywords.filter(function(k) { return k && k !== r.name; });
    if (dk.length > 0) html += '<div class="item-kw">тѕЦтљЇсЃ╗жќбжђБ№╝џ' + esc(dk.join('сђЂ')) + '</div>';
    html += buildHtml(r, true) + '</div>';
  });
  if (results.length > 5) {
    html += '<div style="margin-top:8px;font-size:13px;color:#888">С╗ќ ' + (results.length - 5) + ' С╗ХсЂѓсѓісЂЙсЂЎсђѓсѓѕсѓітЁиСйЊуџёсЂфтЊЂуЏ«тљЇсЂДТцюу┤бсЂЌсЂдсЂЈсЂасЂЋсЂёсђѓ</div>';
  }
  return { header: 'сђї' + q + 'сђЇсЂ«Тцюу┤бухљТъю№╝ѕ' + results.length + 'С╗Х№╝Ѕ', notfound: false, html: html };
}

// тЊЂуЏ«HTMLућЪТѕљ
function buildHtml(item, skipKw) {
  var html = '';
  if (!skipKw) {
    // 1С╗ХУАеуц║ТЎѓ№╝џсѓГсЃ╝сЃ»сЃ╝сЃЅсЂ«сЂ┐№╝ѕсЃљсЃЃсѓИсЂ»сѓ┐сѓцсЃѕсЃФУАїсЂФУАеуц║ТИѕсЂ┐№╝Ѕ
    var dk = item.keywords.filter(function(k) { return k && k !== item.name; });
    if (dk.length > 0) html += '<div class="item-kw">тѕЦтљЇсЃ╗жќбжђБ№╝џ' + esc(dk.join('сђЂ')) + '</div>';
  }
  // тЄдтѕєТќ╣Т│Ћ
  if (item.method && item.method !== 'nan') {
    html += '<div class="lbl-method">­ЪЊІ тЄдтѕєТќ╣Т│Ћ</div>';
    html += '<div class="val-method">' + esc(item.method).replace(/\n/g, '<br>') + '</div>';
  }
  // ТїЂУЙ╝тЁѕсЃ╗жђБухАтЁѕ
  if (item.place && item.place !== 'nan' && item.place !== '') {
    html += '<div class="lbl-place">­ЪЈф ТїЂУЙ╝тЁѕсЃ╗жђБухАтЁѕ</div>';
    var ph = esc(item.place).replace(/\n/g, '<br>')
      .replace(/(Рўј|РёА|TEL:?|Tel:?)?[\sсђђ]*(0\d{1,4}[-№╝ЇРђЋРђљ]\d{1,4}[-№╝ЇРђЋРђљ]\d{1,4})/g,
        function(m, pre, tel) {
          var ct = tel.replace(/[-№╝ЇРђЋРђљ]/g, '-');
          return '<a href="tel:' + ct + '" style="color:#8b4513;font-weight:bold;text-decoration:underline">' + (pre ? pre + ' ' : '') + tel + '</a>';
        });
    html += '<div class="val-place">' + ph + '</div>';
  }
  // Т│еТёЈС║ІжаЁ
  if (item.note && item.note !== 'nan' && item.note !== '') {
    html += '<div class="lbl-note">Рџа№ИЈ Т│еТёЈС║ІжаЁ</div>';
    html += '<div class="val-note">' + esc(item.note).replace(/\n/g, '<br>') + '</div>';
  }
  return html;
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
</script>
</body>
</html>
